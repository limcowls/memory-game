        }

            margin-bottom: 15px;
            color: #2E7D32;
            text-align: center;
        }

            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

            background-color: #E8F5E9;
            color: #2E7D32;
        }
