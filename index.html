<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기억력 쑥쑥! 메모리 게임</title>
    <style>
        :root {
            --bg-color: #f4f9f4;
            --primary-color: #4CAF50;
            --card-bg: #ffffff;
            --card-back: #81C784;
            --text-color: #333333;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #2E7D32;
            text-align: center;
        }

        .info-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .stat-box {
            font-size: 1.1rem;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 8px;
            background-color: #E8F5E9;
            color: #2E7D32;
        }

        .stat-box.best { background-color: #FFF9C4; color: #F57F17; }
        .stat-box.score { background-color: #E3F2FD; color: #1565C0; }

        .controls-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #E0E0E0;
        }

        .btn {
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }

        .btn:active { transform: scale(0.95); }
        .btn-start { background-color: #2196F3; }
        .btn-start:hover { background-color: #1976D2; }
        .btn-end { background-color: #F44336; display: none; }
        .btn-end:hover { background-color: #D32F2F; }

        #game-board {
            display: grid;
            gap: 10px;
            margin-bottom: 30px;
            perspective: 1000px;
            min-height: 300px;
            align-items: center;
            justify-content: center;
        }

        /* 게임 시작 전 안내 문구 */
        #start-prompt {
            font-size: 1.5rem;
            color: #757575;
            text-align: center;
            grid-column: 1 / -1;
        }

        .card {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
            cursor: pointer;
        }

        @media (min-width: 400px) {
            .card { width: 90px; height: 90px; }
            #game-board { gap: 15px; }
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .card-front {
            background-color: var(--card-bg);
            transform: rotateY(180deg);
            border: 3px solid #A5D6A7;
        }

        .card-back {
            background-color: var(--card-back);
            background-image: radial-gradient(#ffffff 10%, transparent 10%), radial-gradient(#ffffff 10%, transparent 10%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            border: 3px solid #4CAF50;
        }

        .matched .card-front {
            background-color: #FFF9C4;
            border-color: #FBC02D;
            transition: background-color 0.5s;
        }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 80%;
        }

        .modal-content h2 { color: #E65100; margin-top: 0; }
        .modal-score { font-size: 1.8rem; font-weight: bold; color: #1565C0; margin: 15px 0; }
        .new-record { color: #E91E63; font-weight: bold; font-size: 1.2rem; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>기억력 쑥쑥 게임</h1>
    
    <div class="info-panel">
        <div class="stat-box best">🏆 최고 점수: <span id="best-score-display">0</span></div>
        <div class="stat-box score">⭐ 누적 점수: <span id="score-display">0</span></div>
        <div class="stat-box">⏱ 진행 시간: <span id="time-display">0</span>초</div>
        <div class="stat-box">🖐 누적 시도: <span id="moves-display">0</span>번</div>
        
        <div class="controls-container">
            <span id="level-display" style="font-size: 1.3rem; font-weight: bold; color:#2E7D32;">대기 중...</span>
            <button id="btn-start" class="btn btn-start" onclick="startGame()">▶ 게임 시작</button>
            <button id="btn-end" class="btn btn-end" onclick="endGameByUser()">■ 게임 종료</button>
        </div>
    </div>

    <div id="game-board">
        <div id="start-prompt">위의 <strong>[게임 시작]</strong> 버튼을 눌러주세요!</div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title">수고하셨습니다! 🎉</h2>
            <div id="modal-result-text"></div>
            <div class="modal-score">최종 획득 점수: <span id="modal-score-display">0</span>점</div>
            <p id="new-record-msg" class="new-record" style="display: none;">🎉 최고 점수 경신! 🎉</p>
            <button id="btn-modal-next" class="btn btn-start" style="margin-top: 15px;" onclick="nextLevel()">다음 단계 계속하기</button>
            <button id="btn-modal-close" class="btn btn-end" style="margin-top: 15px; display: none;" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <script>
        const allEmojis = ['🍎', '🍌', '🍇', '🍉', '🍓', '🥕', '🌽', '🌻', '🐶', '🐱', '🐰', '🐟', '🚗', '🎈', '⏰', '☎️'];
        const MAX_LEVEL = 5;
        
        let isGameRunning = false;
        let currentLevel = 1;
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let isLocked = false;
        
        // 누적 데이터 변수
        let totalMoves = 0;
        let totalSeconds = 0;
        let totalScore = 0;
        let bestScore = 0;
        let timer = null;

        const board = document.getElementById('game-board');
        const levelDisplay = document.getElementById('level-display');
        const timeDisplay = document.getElementById('time-display');
        const movesDisplay = document.getElementById('moves-display');
        const scoreDisplay = document.getElementById('score-display');
        const bestScoreDisplay = document.getElementById('best-score-display');
        
        const btnStart = document.getElementById('btn-start');
        const btnEnd = document.getElementById('btn-end');
        const modal = document.getElementById('modal');

        // 초기 설정 (최고 점수만 불러옴)
        function initApp() {
            const savedBestScore = localStorage.getItem('memoryGameBestScore');
            if (savedBestScore) {
                bestScore = parseInt(savedBestScore);
                bestScoreDisplay.innerText = bestScore;
            }
        }

        // [게임 시작] 버튼 클릭 시
        function startGame() {
            isGameRunning = true;
            currentLevel = 1;
            totalMoves = 0;
            totalSeconds = 0;
            totalScore = 0;
            
            updateDisplay();
            
            btnStart.style.display = 'none';
            btnEnd.style.display = 'inline-block';
            
            startTimer();
            setupLevel();
        }

        // 사용자가 명시적으로 [게임 종료] 버튼 클릭 시
        function endGameByUser() {
            if (confirm('게임을 여기서 종료하고 점수를 확인하시겠습니까?')) {
                finishGameSession('사용자 종료');
            }
        }

        // 레벨 설정 및 보드 그리기
