<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기억력 쑥쑥! 메모리 게임</title>
    <style>
        :root {
            --bg-color: #f4f9f4;
            --primary-color: #4CAF50;
            --card-bg: #ffffff;
            --card-back: #81C784;
            --text-color: #333333;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #2E7D32;
            text-align: center;
        }

        /* 정보 패널 스타일 개선 (모바일 대응) */
        .info-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .stat-box {
            font-size: 1.1rem;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 8px;
            background-color: #E8F5E9;
            color: #2E7D32;
        }

        .stat-box.best { background-color: #FFF9C4; color: #F57F17; }
        .stat-box.score { background-color: #E3F2FD; color: #1565C0; }

        .btn-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }

        .btn:hover { background-color: #388E3C; }
        .btn-reset { background-color: #E53935; font-size: 0.9rem; padding: 8px 15px; }
        .btn-reset:hover { background-color: #C62828; }

        #game-board {
            display: grid;
            gap: 10px;
            margin-bottom: 30px;
            perspective: 1000px;
        }

        .card {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
            cursor: pointer;
        }

        @media (min-width: 400px) {
            .card { width: 90px; height: 90px; }
            #game-board { gap: 15px; }
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .card-front {
            background-color: var(--card-bg);
            transform: rotateY(180deg);
            border: 3px solid #A5D6A7;
        }

        .card-back {
            background-color: var(--card-back);
            background-image: radial-gradient(#ffffff 10%, transparent 10%), radial-gradient(#ffffff 10%, transparent 10%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            border: 3px solid #4CAF50;
        }

        .matched .card-front {
            background-color: #FFF9C4;
            border-color: #FBC02D;
            transition: background-color 0.5s;
        }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal-content h2 { color: #E65100; margin-top: 0; }
        .modal-score { font-size: 1.5rem; font-weight: bold; color: #1565C0; margin: 15px 0; }
        .new-record { color: #E91E63; font-weight: bold; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>기억력 쑥쑥 게임</h1>
    
    <div class="info-panel">
        <div class="stat-box best">🏆 최고 점수: <span id="best-score-display">0</span></div>
        <div class="stat-box score">⭐ 내 점수: <span id="score-display">0</span></div>
        <div class="stat-box">⏱ 시간: <span id="time-display">0</span>초</div>
        <div class="stat-box">🖐 시도: <span id="moves-display">0</span>번</div>
        
        <div class="btn-container">
            <span id="level-display" style="font-size: 1.2rem; font-weight: bold; color:#2E7D32;">현재 1단계</span>
            <button class="btn btn-reset" onclick="resetGame()">데이터 초기화</button>
        </div>
    </div>

    <div id="game-board"></div>

    <div id="modal">
        <div class="modal-content">
            <h2>참 잘하셨어요! 🎉</h2>
            <div id="modal-result-text"></div>
            <div class="modal-score">획득 점수: <span id="modal-score-display">0</span>점</div>
            <p id="new-record-msg" class="new-record" style="display: none;">🎉 최고 점수 경신! 🎉</p>
            <button class="btn" style="margin-top: 15px;" onclick="nextLevel()">다음 단계로 가기</button>
        </div>
    </div>

    <script>
        const allEmojis = ['🍎', '🍌', '🍇', '🍉', '🍓', '🥕', '🌽', '🌻', '🐶', '🐱', '🐰', '🐟', '🚗', '🎈', '⏰', '☎️'];
        
        let currentLevel = 1;
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let isLocked = false;
        
        // 점수 및 시간 관련 변수
        let moves = 0;
        let seconds = 0;
        let timer = null;
        let currentScore = 0;
        let bestScore = 0;

        const board = document.getElementById('game-board');
        const levelDisplay = document.getElementById('level-display');
        const timeDisplay = document.getElementById('time-display');
        const movesDisplay = document.getElementById('moves-display');
        const scoreDisplay = document.getElementById('score-display');
        const bestScoreDisplay = document.getElementById('best-score-display');
        const modal = document.getElementById('modal');

        function initGame() {
            const savedLevel = localStorage.getItem('memoryGameLevel');
            const savedBestScore = localStorage.getItem('memoryGameBestScore');
            
            if (savedLevel) currentLevel = parseInt(savedLevel);
            if (savedBestScore) {
                bestScore = parseInt(savedBestScore);
                bestScoreDisplay.innerText = bestScore;
            }
            
            setupLevel();
        }

        function setupLevel() {
            levelDisplay.innerText = `현재 ${currentLevel}단계`;
            board.innerHTML = '';
            flippedCards = [];
            matchedPairs = 0;
            isLocked = false;
            
            // 타이머 및 시도 횟수 초기화
            stopTimer();
            seconds = 0;
            moves = 0;
            currentScore = 0;
            timeDisplay.innerText = seconds;
            movesDisplay.innerText = moves;
            scoreDisplay.innerText = currentScore;
            modal.style.display = 'none';
            document.getElementById('new-record-msg').style.display = 'none';

            let pairsCount;
            let columns;

            if (currentLevel === 1) { pairsCount = 2; columns = 2; }
            else if (currentLevel === 2) { pairsCount = 3; columns = 3; }
            else if (currentLevel === 3) { pairsCount = 4; columns = 4; }
            else if (currentLevel === 4) { pairsCount = 6; columns = 4; }
            else if (currentLevel >= 5) { pairsCount = 8; columns = 4; }

            board.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;

            let selectedEmojis = allEmojis.slice(0, pairsCount);
            cards = [...selectedEmojis, ...selectedEmojis];
            cards.sort(() => Math.random() - 0.5);

            cards.forEach((emoji, index) => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.emoji = emoji;
                
                cardElement.innerHTML = `
                    <div class="card-face card-front">${emoji}</div>
                    <div class="card-face card-back"></div>
                `;

                cardElement.addEventListener('click', flipCard);
                board.appendChild(cardElement);
            });
        }

        function startTimer() {
            if (!timer) {
                timer = setInterval(() => {
                    seconds++;
                    timeDisplay.innerText = seconds;
                }, 1000);
            }
        }

        function stopTimer() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        function flipCard() {
            if (isLocked) return;
            if (this.classList.contains('flipped')) return;

            startTimer(); // 첫 카드를 뒤집을 때 타이머 시작

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                moves++; // 카드 2장을 뒤집으면 시도 횟수 1 증가
                movesDisplay.innerText = moves;
                checkForMatch();
            }
        }

        function checkForMatch() {
            isLocked = true;
            const [card1, card2] = flippedCards;

            if (card1.dataset.emoji === card2.dataset.emoji) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                
                // 맞출 때마다 실시간 점수 상승 (기본 100점 - 걸린 시간 약간 감점)
                // 점수가 마이너스가 되지 않도록 최소 10점 보장
                let pointEarned = Math.max(10, 100 - (seconds * 2)); 
                currentScore += pointEarned;
                scoreDisplay.innerText = currentScore;

                flippedCards = [];
                isLocked = false;

                if (matchedPairs === cards.length / 2) {
                    gameClear();
                }
            } else {
                // 틀리면 점수 10점 차감 (0점 밑으로는 안 내려감)
                currentScore = Math.max(0, currentScore - 10);
                scoreDisplay.innerText = currentScore;

                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLocked = false;
                }, 1200);
            }
        }

        function gameClear() {
            stopTimer();
            
            // 클리어 보너스 점수 (단계 * 500점) - (시도 횟수 페널티)
            let clearBonus = Math.max(100, (currentLevel * 500) - (moves * 10));
            currentScore += clearBonus;
            scoreDisplay.innerText = currentScore;

            // 모달창 텍스트 업데이트
            document.getElementById('modal-result-text').innerText = `${seconds}초 만에 ${moves}번의 시도로 완성하셨습니다!`;
            document.getElementById('modal-score-display').innerText = currentScore;

            // 최고 점수 갱신 확인
            if (currentScore > bestScore) {
                bestScore = currentScore;
                localStorage.setItem('memoryGameBestScore', bestScore);
                bestScoreDisplay.innerText = bestScore;
                document.getElementById('new-record-msg').style.display = 'block';
            }

            setTimeout(() => {
                modal.style.display = 'flex';
            }, 500);
        }

        function nextLevel() {
            if(currentLevel < 5) {
                currentLevel++;
            }
            localStorage.setItem('memoryGameLevel', currentLevel);
            setupLevel();
        }

        function resetGame() {
            if (confirm('진행 단계와 최고 점수를 모두 초기화하시겠습니까?')) {
                currentLevel = 1;
                bestScore = 0;
                localStorage.removeItem('memoryGameLevel');
                localStorage.removeItem('memoryGameBestScore');
                bestScoreDisplay.innerText = bestScore;
                setupLevel();
            }
        }

        initGame();
    </script>
</body>
</html>
