<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기억력 쑥쑥! 메모리 게임</title>
    <style>
        :root {
            --bg-color: #f4f9f4;
            --primary-color: #4CAF50;
            --card-bg: #ffffff;
            --card-back: #81C784;
            --text-color: #333333;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #2E7D32;
            text-align: center;
        }

        .info-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .stat-box {
            font-size: 1.1rem;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 8px;
            background-color: #E8F5E9;
            color: #2E7D32;
        }

        .stat-box.best { background-color: #FFF9C4; color: #F57F17; }
        .stat-box.last { background-color: #F3E5F5; color: #8E24AA; } /* 최근 점수 색상 */
        .stat-box.score { background-color: #E3F2FD; color: #1565C0; }

        .controls-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #E0E0E0;
        }

        .btn {
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }

        .btn:active { transform: scale(0.95); }
        .btn-start { background-color: #2196F3; }
        .btn-start:hover { background-color: #1976D2; }
        .btn-end { background-color: #F44336; display: none; }
        .btn-end:hover { background-color: #D32F2F; }

        #game-board {
            display: grid;
            gap: 10px;
            margin-bottom: 30px;
            perspective: 1000px;
            min-height: 300px;
            align-items: center;
            justify-content: center;
        }

        #start-prompt {
            font-size: 1.5rem;
            color: #757575;
            text-align: center;
            grid-column: 1 / -1;
        }

        .card {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
            cursor: pointer;
        }

        @media (min-width: 400px) {
            .card { width: 90px; height: 90px; }
            #game-board { gap: 15px; }
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .card-front {
            background-color: var(--card-bg);
            transform: rotateY(180deg);
            border: 3px solid #A5D6A7;
        }

        .card-back {
            background-color: var(--card-back);
            background-image: radial-gradient(#ffffff 10%, transparent 10%), radial-gradient(#ffffff 10%, transparent 10%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            border: 3px solid #4CAF50;
        }

        .matched .card-front {
            background-color: #FFF9C4;
            border-color: #FBC02D;
            transition: background-color 0.5s;
        }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 80%;
        }

        .modal-content h2 { color: #E65100; margin-top: 0; }
        .modal-score { font-size: 1.8rem; font-weight: bold; color: #1565C0; margin: 15px 0; }
        .new-record { color: #E91E63; font-weight: bold; font-size: 1.2rem; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>기억력 쑥쑥 게임</h1>
    
    <div class="info-panel">
        <div class="stat-box best">🏆 최고 점수: <span id="best-score-display">0</span></div>
        <div class="stat-box last">🕒 최근 점수: <span id="last-score-display">0</span></div>
        <div class="stat-box score">⭐ 현재 점수: <span id="score-display">0</span></div>
        <div class="stat-box">⏱ 시간: <span id="time-display">0</span>초</div>
        <div class="stat-box">🖐 시도: <span id="moves-display">0</span>번</div>
        
        <div class="controls-container">
            <span id="level-display" style="font-size: 1.3rem; font-weight: bold; color:#2E7D32;">대기 중...</span>
            <button id="btn-start" class="btn btn-start" onclick="startGame()">▶ 게임 시작</button>
            <button id="btn-end" class="btn btn-end" onclick="endGameByUser()">■ 게임 종료</button>
        </div>
    </div>

    <div id="game-board">
        <div id="start-prompt">위의 <strong>[게임 시작]</strong> 버튼을 눌러주세요!</div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title">수고하셨습니다! 🎉</h2>
            <div id="modal-result-text"></div>
            <div class="modal-score">최종 획득 점수: <span id="modal-score-display">0</span>점</div>
            <p id="new-record-msg" class="new-record" style="display: none;">🎉 최고 점수 경신! 🎉</p>
            <button id="btn-modal-next" class="btn btn-start" style="margin-top: 15px;" onclick="nextLevel()">다음 단계 계속하기</button>
            <button id="btn-modal-close" class="btn btn-end" style="margin-top: 15px; display: none;" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <script>
        const allEmojis = ['🍎', '🍌', '🍇', '🍉', '🍓', '🥕', '🌽', '🌻', '🐶', '🐱', '🐰', '🐟', '🚗', '🎈', '⏰', '☎️'];
        const MAX_LEVEL = 5;
        
        let isGameRunning = false;
        let currentLevel = 1;
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let isLocked = false;
        
        let totalMoves = 0;
        let totalSeconds = 0;
        let totalScore = 0;
        let bestScore = 0;
        let lastScore = 0;
        let timer = null;

        const board = document.getElementById('game-board');
        const levelDisplay = document.getElementById('level-display');
        const timeDisplay = document.getElementById('time-display');
        const movesDisplay = document.getElementById('moves-display');
        const scoreDisplay = document.getElementById('score-display');
        const bestScoreDisplay = document.getElementById('best-score-display');
        const lastScoreDisplay = document.getElementById('last-score-display');
        
        const btnStart = document.getElementById('btn-start');
        const btnEnd = document.getElementById('btn-end');
        const modal = document.getElementById('modal');

        // 초기 설정 (최고 점수 및 최근 점수 불러오기)
        function initApp() {
            const savedBestScore = localStorage.getItem('memoryGameBestScore');
            const savedLastScore = localStorage.getItem('memoryGameLastScore');
            
            if (savedBestScore) {
                bestScore = parseInt(savedBestScore);
                bestScoreDisplay.innerText = bestScore;
            }
            if (savedLastScore) {
                lastScore = parseInt(savedLastScore);
                lastScoreDisplay.innerText = lastScore;
            }
        }

        function startGame() {
            isGameRunning = true;
            currentLevel = 1;
            totalMoves = 0;
            totalSeconds = 0;
            totalScore = 0;
            
            updateDisplay();
            
            btnStart.style.display = 'none';
            btnEnd.style.display = 'inline-block';
            
            startTimer();
            setupLevel();
        }

        function endGameByUser() {
            if (confirm('게임을 여기서 종료하고 점수를 확인하시겠습니까?')) {
                finishGameSession('사용자 종료');
            }
        }

        function setupLevel() {
            levelDisplay.innerText = `현재 ${currentLevel}단계 진행 중`;
            board.innerHTML = '';
            flippedCards = [];
            matchedPairs = 0;
            isLocked = false;
            
            let pairsCount;
            let columns;

            if (currentLevel === 1) { pairsCount = 2; columns = 2; }
            else if (currentLevel === 2) { pairsCount = 3; columns = 3; }
            else if (currentLevel === 3) { pairsCount = 4; columns = 4; }
            else if (currentLevel === 4) { pairsCount = 6; columns = 4; }
            else if (currentLevel >= 5) { pairsCount = 8; columns = 4; }

            board.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;

            let selectedEmojis = allEmojis.slice(0, pairsCount);
            cards = [...selectedEmojis, ...selectedEmojis];
            cards.sort(() => Math.random() - 0.5);

            cards.forEach((emoji) => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.emoji = emoji;
                
                cardElement.innerHTML = `
                    <div class="card-face card-front">${emoji}</div>
                    <div class="card-face card-back"></div>
                `;

                cardElement.addEventListener('click', flipCard);
                board.appendChild(cardElement);
            });
        }

        function startTimer() {
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                totalSeconds++;
                timeDisplay.innerText = totalSeconds;
            }, 1000);
        }

        function stopTimer() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        function flipCard() {
            if (!isGameRunning || isLocked) return;
            if (this.classList.contains('flipped')) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                totalMoves++; 
                movesDisplay.innerText = totalMoves;
                checkForMatch();
            }
        }

        function checkForMatch() {
            isLocked = true;
            const [card1, card2] = flippedCards;

            if (card1.dataset.emoji === card2.dataset.emoji) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                
                totalScore += 100;
                scoreDisplay.innerText = totalScore;

                flippedCards = [];
                isLocked = false;

                if (matchedPairs === cards.length / 2) {
                    levelClear();
                }
            } else {
                totalScore = Math.max(0, totalScore - 10);
                scoreDisplay.innerText = totalScore;

                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLocked = false;
                }, 1200);
            }
        }

        function levelClear() {
            totalScore += (currentLevel * 200);
            scoreDisplay.innerText = totalScore;

            if (currentLevel < MAX_LEVEL) {
                stopTimer();
                document.getElementById('modal-title').innerText = `${currentLevel}단계 통과!`;
                document.getElementById('modal-result-text').innerText = "아주 잘하고 계십니다. 다음 단계로 넘어가 볼까요?";
                document.getElementById('modal-score-display').innerText = totalScore;
                document.getElementById('new-record-msg').style.display = 'none';
                
                document.getElementById('btn-modal-next').style.display = 'inline-block';
                document.getElementById('btn-modal-close').style.display = 'none';
                
                setTimeout(() => { modal.style.display = 'flex'; }, 500);
            } else {
                finishGameSession('모든 단계 완료');
            }
        }

        function nextLevel() {
            modal.style.display = 'none';
            currentLevel++;
            startTimer();
            setupLevel();
        }

        // 게임 세션 최종 종료 및 점수 저장
        function finishGameSession(reason) {
            isGameRunning = false;
            stopTimer();

            let timePenalty = totalSeconds * 2;
            let movePenalty = totalMoves * 5;
            let finalScore = Math.max(0, totalScore - timePenalty - movePenalty);
            
            totalScore = finalScore;
            scoreDisplay.innerText = totalScore;

            // 최근 점수 저장 로직 추가
            lastScore = totalScore;
            localStorage.setItem('memoryGameLastScore', lastScore);
            lastScoreDisplay.innerText = lastScore;

            if (totalScore > bestScore) {
                bestScore = totalScore;
                localStorage.setItem('memoryGameBestScore', bestScore);
                bestScoreDisplay.innerText = bestScore;
                document.getElementById('new-record-msg').style.display = 'block';
            } else {
                document.getElementById('new-record-msg').style.display = 'none';
            }

            document.getElementById('modal-title').innerText = "게임 종료! 수고하셨습니다 👏";
            document.getElementById('modal-result-text').innerText = `총 ${totalSeconds}초 동안 ${totalMoves}번의 시도를 하셨습니다. (${reason})`;
            document.getElementById('modal-score-display').innerText = totalScore;
            
            document.getElementById('btn-modal-next').style.display = 'none';
            document.getElementById('btn-modal-close').style.display = 'inline-block';

            modal.style.display = 'flex';

            btnStart.style.display = 'inline-block';
            btnStart.innerText = "▶ 새 게임 시작";
            btnEnd.style.display = 'none';
            levelDisplay.innerText = "대기 중...";
            board.innerHTML = '<div id="start-prompt">위의 <strong>[새 게임 시작]</strong> 버튼을 눌러주세요!</div>';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function updateDisplay() {
            timeDisplay.innerText = totalSeconds;
            movesDisplay.innerText = totalMoves;
            scoreDisplay.innerText = totalScore;
        }

        initApp();
    </script>
</body>
</html>
